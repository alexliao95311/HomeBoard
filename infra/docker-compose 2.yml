services:
  backend:
    build: ../backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app

  frontend:
    build: ../frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

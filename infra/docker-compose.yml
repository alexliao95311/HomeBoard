services:
  backend:
    build: ../backend
    command: uvicorn main:app --host 0.0.0.0 --port 5000 --reload
    environment:
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ../backend:/app

  frontend:
    build: ../frontend
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
